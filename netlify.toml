[build]
  publish = "."
  # Не деплоїти, якщо змінились лише dev-інструменти/доки, що не впливають на опубліковані файли.
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- . ':!tools' ':!.claude' ':!*.md' ':!README.txt'"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
